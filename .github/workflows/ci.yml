name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - intake-service
          - eligibility-service
          - records-service
          - scheduling-service
          - interop-service
          - roi-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Import smoke test
        working-directory: services/${{ matrix.service }}
        # Some services (intake-service, eligibility-service) import the shared
        # libs/ package that lives at the repo root, outside the service dir.
        # It's on the path in Docker (copied into /app, see each Dockerfile) and
        # in pytest (conftest.py adds the repo root), but `python -c` from the
        # service dir only puts the cwd on sys.path — so libs.* won't resolve
        # without the repo root here too. Sibling imports (config, check, ...)
        # still resolve via the cwd. No top-level module at the repo root
        # collides with a service's same-named sibling, so this is safe for the
        # services that don't use libs/ as well.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "import app; print('${{ matrix.service }} ok')"

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r requirements-dev.txt
      - name: Run unit tests
        # NOTE: integration tests (marked @pytest.mark.integration) need a live
        # Postgres + Redis and are skipped here. Coverage of the security/auth
        # paths is thin — tracked in RIV-201.
        run: pytest -m "not integration" -q

  # NOTE: no dependency vulnerability scan, no container image scan, and no
  # secret-scanning step. Images are built and pushed straight from main.
  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, services, tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
